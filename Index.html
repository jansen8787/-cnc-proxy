<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC KI Analyzer</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}
.box{
max-width:500px;
margin:auto;
background:#1c1c1c;
padding:25px;
border-radius:16px;
}
input,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
font-size:16px;
}
button{
background:#00c853;
color:white;
font-weight:bold;
}
img{
max-width:100%;
margin-top:15px;
border-radius:12px;
}
pre{
text-align:left;
white-space:pre-wrap;
background:#000;
padding:15px;
border-radius:12px;
margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
<h1>🧠 CNC KI Analyzer</h1>

<input type="file" id="file">

<img id="preview">

<button onclick="analyze()">Zeichnung analysieren</button>

<pre id="result">Warte auf Bild...</pre>
</div>

<script>
let imageBase64="";

document.getElementById("file").onchange=function(e){
const file=e.target.files[0];
const reader=new FileReader();

reader.onload=function(){
imageBase64=reader.result;
document.getElementById("preview").src=imageBase64;
};

reader.readAsDataURL(file);
}

async function analyze(){

document.getElementById("result").innerText="Analysiere...";

const res=await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image_url:imageBase64
})
});

const data=await res.json();

document.getElementById("result").innerText=
JSON.stringify(data,null,2);
}
</script>

</body>
</html>
