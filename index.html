<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CNC KI Analyzer PRO</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial, sans-serif;
background:#050505;
color:white;
}

.wrapper{
max-width:760px;
margin:auto;
padding:20px;
}

.panel{
background:#121212;
border-radius:20px;
padding:25px;
box-shadow:0 0 25px rgba(0,255,120,0.15);
}

h1{
text-align:center;
font-size:42px;
margin-bottom:25px;
}

input[type=file]{
width:100%;
background:#1e1e1e;
color:white;
padding:14px;
border-radius:12px;
border:none;
margin-bottom:18px;
}

button{
width:100%;
padding:18px;
font-size:24px;
font-weight:bold;
border:none;
border-radius:14px;
cursor:pointer;
margin-top:10px;
}

.main{
background:#00d15e;
color:white;
}

.second{
background:#222;
color:white;
}

img{
max-width:100%;
border-radius:16px;
margin-top:15px;
margin-bottom:15px;
}

#status{
margin-top:20px;
padding:18px;
background:black;
border-radius:14px;
font-size:20px;
white-space:pre-wrap;
overflow:auto;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:14px;
margin-top:12px;
}

.green{color:#00ff88;}
.blue{color:#00cfff;}
.orange{color:#ffb300;}

.loader{
font-size:22px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{opacity:0.4;}
50%{opacity:1;}
100%{opacity:0.4;}
}
</style>
</head>

<body>

<div class="wrapper">
<div class="panel">

<h1>🧠 CNC KI Analyzer PRO</h1>

<input type="file" id="fileInput" accept="image/*">

<img id="preview" style="display:none;">

<button class="main" onclick="analyze()">Zeichnung analysieren</button>

<div id="status">Bereit...</div>

<button class="second" onclick="location.reload()">Neu starten</button>

</div>
</div>

<script>
const proxy="https://project-29sbg.vercel.app/api/chat";

document.getElementById("fileInput").addEventListener("change",function(e){
const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();

reader.onload=function(){
document.getElementById("preview").src=reader.result;
document.getElementById("preview").style.display="block";
};

reader.readAsDataURL(file);
});

async function analyze(){

const file=document.getElementById("fileInput").files[0];

if(!file){
alert("Bitte Datei auswählen");
return;
}

document.getElementById("status").innerHTML="<div class='loader'>🔍 Analysiere Zeichnung...</div>";

const reader=new FileReader();

reader.onload=async function(){

try{

const response=await fetch(proxy,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
image_url:reader.result
})
});

const data=await response.json();

showResult(data);

}catch(err){
document.getElementById("status").innerHTML="❌ Fehler: "+err;
}

};

reader.readAsDataURL(file);
}

function showResult(data){

let html="<div class='green'><b>✅ Analyse abgeschlossen</b></div>";

if(data.result){

html+="<div class='card blue'><b>📦 Rohdaten von KI:</b></div>";
html+="<div class='card'>"+JSON.stringify(data.result,null,2)+"</div>";

}else{

html+="<div class='card orange'>"+JSON.stringify(data,null,2)+"</div>";

}

document.getElementById("status").innerHTML=html;
}
</script>

</body>
</html>
